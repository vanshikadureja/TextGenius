<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Azure AI Language Analyzer</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0}
.container{max-width:900px;margin:40px auto;background:#fff;padding:24px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
textarea{width:100%;height:180px;padding:10px;font-size:16px}
button{margin-top:15px;padding:12px 20px;background:#0078D4;color:#fff;border:none;border-radius:6px;cursor:pointer}
button:hover{background:#005fa3}
.card{margin-top:20px;padding:15px;background:#f7f7f7;border-left:5px solid #0078D4;border-radius:6px}
h3{margin-bottom:6px}
#error{color:red;margin-top:10px}
#loading{display:none;color:#0078D4;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<h1>Azure AI Language Analyzer</h1>
<p>Language Detection • PII Redaction • Abstractive Summarization</p>

<textarea id="text" placeholder="Enter your text here..."></textarea><br>
<button id="analyzeBtn">Analyze Text</button>

<div id="loading">Analyzing...</div>
<div id="error"></div>

<div id="result" style="display:none">
<div class="card">
<h3>Detected Language</h3>
<p id="language"></p>
</div>

<div class="card">
<h3>PII Redacted Text</h3>
<p id="pii"></p>
</div>

<div class="card">
<h3>Abstractive Summary</h3>
<p id="summary"></p>
</div>
</div>
</div>

<script>
const btn=document.getElementById("analyzeBtn");
btn.addEventListener("click",async()=>{
 const text=document.getElementById("text").value.trim();
 document.getElementById("error").textContent="";
 if(!text){
   document.getElementById("error").textContent="Please enter some text.";
   return;
 }
 document.getElementById("loading").style.display="block";
 document.getElementById("result").style.display="none";
 try{
   const response=await fetch("/api/analyze",{
     method:"POST",
     headers:{"Content-Type":"application/json"},
     body:JSON.stringify({text:text})
   });
   const data=await response.json();
   if(!response.ok){
      throw new Error(data.error||"Request failed");
   }
   document.getElementById("language").textContent=data.language;
   document.getElementById("pii").textContent=data.piiRedactedText;
   document.getElementById("summary").textContent=data.summary;
   document.getElementById("result").style.display="block";
 }catch(e){
   document.getElementById("error").textContent=e.message;
 }finally{
   document.getElementById("loading").style.display="none";
 }
});
</script>
</body>
</html>
