<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Azure AI Premium Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Segoe UI,Arial;background:#0f172a;color:#fff}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:#0b1220;padding:20px}
.main{margin-left:220px;padding:30px}
.card{background:#18243d;padding:20px;border-radius:14px;margin:15px 0}
.drop{border:2px dashed #60a5fa;padding:40px;text-align:center;border-radius:12px}
button{padding:12px 18px;background:#0078d4;color:#fff;border:none;border-radius:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
canvas{background:#fff;border-radius:12px}
</style>
</head>
<body>
<div class="sidebar">
<h2>☁ Azure AI</h2>
<p>Dashboard</p>
<hr>
<p>Language Detection</p>
<p>PII Redaction</p>
<p>Summarization</p>
<button onclick="document.body.classList.toggle('light')">Theme</button>
</div>

<div class="main">
<h1>Microsoft AI Bootcamp Dashboard</h1>

<div class="card">
<div class="drop">
Drag & Drop TXT / PDF / DOCX Here
</div>
</div>

<div class="grid">
<div class="card"><h3>Language</h3><p id="language">-</p></div>
<div class="card"><h3>PII</h3><p id="pii">-</p></div>
<div class="card"><h3>Summary</h3><p id="summary">-</p></div>
</div>

<div class="card">
<canvas id="chart" height="120"></canvas>
</div>

<script>
new Chart(document.getElementById('chart'),{
type:'bar',
data:{
labels:['Language','PII','Summary'],
datasets:[{label:'Confidence',data:[95,98,93]}]
}
});
</script>
</div>
</body>
</html>
